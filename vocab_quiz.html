<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary & Grammar Quiz</title>
    <style>
        :root {
            --primary-color: #673ab7;
            --bg-color: #f0ebf8;
            --card-bg: #ffffff;
            --text-main: #202124;
            --text-muted: #5f6368;
            --border-color: #dadce0;
            --correct-color: #1e8e3e;
            --incorrect-color: #d93025;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            width: 100%;
            max-width: 640px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 24px;
            margin-bottom: 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .header-card {
            border-top: 10px solid var(--primary-color);
        }

        .header-card h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        .header-card p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .question-text {
            font-size: 16px;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .required { color: var(--incorrect-color); }

        .input-text {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 8px 0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-text:focus {
            border-bottom: 2px solid var(--primary-color);
        }

        .option-label {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            cursor: pointer;
        }

        .option-label input[type="radio"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover { background-color: #5e35b1; }
        .btn-submit:disabled { background-color: #b39ddb; cursor: not-allowed; }

        .feedback {
            font-size: 14px;
            font-weight: bold;
            margin-top: 12px;
            display: none;
            padding: 8px;
            border-radius: 4px;
        }

        .correct-text { color: var(--correct-color); background-color: #e6f4ea; }
        .incorrect-text { color: var(--incorrect-color); background-color: #fce8e6; }
        
        #scoreDisplay {
            display: none;
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <form id="quizForm">
        <div class="card header-card">
            <h1>Vocabulary & Grammar Quiz</h1>
            <p>Please complete all questions below. Your results will be displayed upon submission.</p>
            <div id="scoreDisplay"></div>
        </div>

        <div class="card">
            <div class="question-text">Full Name <span class="required">*</span></div>
            <input type="text" name="name" class="input-text" placeholder="Your answer" required>
        </div>

        <div id="questionsContainer"></div>

        <div style="display: flex; justify-content: flex-start; margin-bottom: 40px;">
            <button type="submit" id="submitBtn" class="btn-submit">Submit</button>
        </div>
    </form>
</div>

<script>
    // PASTE YOUR DEPLOYED GOOGLE APPS SCRIPT WEB APP URL HERE:
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzIAkrqq5k_if0yOaDQvoz63X4D86vMIcjWTEgBT_3liPd-eEt22kaWf-Z0xFZYD30kiQ/exec';

    const questionsData = [
        { id: 'q1', text: 'The new smartphone model is roughly ___ to the older one in terms of performance, but it costs much more.', options: ['equivalent', 'involved', 'innate', 'neural'] },
        { id: 'q2', text: 'For this mathematical problem, we need to ___ that x is greater than zero before proceeding with the calculation.', options: ['assume', 'determine', 'lay', 'encl'] },
        { id: 'q3', text: 'The tech company is widely known for its ___ designs that constantly change the market.', options: ['innovative', 'unexceptional', 'replicable', 'deprived'] },
        { id: 'q4', text: 'After years of hard work, she finally won a scholarship to study at a highly ___ university in the United Kingdom.', options: ['prestigious', 'selective', 'neural', 'resolute'] },
        { id: 'q5', text: 'The generous doctor has ___ his entire life to helping poor children in remote mountainous areas.', options: ['devoted', 'involved', 'associated', 'deprived'] },
        { id: 'q6', text: 'Her extraordinary musical talent seems completely ___; she could play the piano beautifully before she even took a single lesson.', options: ['innate', 'replicable', 'penultimate', 'unexceptional'] },
        { id: 'q7', text: 'Many people believe that teaching is a very ___ profession because you get to see your students grow and succeed.', options: ['rewarding', 'outstanding', 'intellectual', 'curious'] },
        { id: 'q8', text: 'Honesty, patience, and hard work are three essential personality ___ of a successful leader.', options: ['traits', 'creatures', 'spheres', 'trails'] },
        { id: 'q9', text: 'Despite facing many challenges and criticism, she remained ___ in her decision to start her own business.', options: ['resolute', 'deprived', 'selective', 'involved'] },
        { id: 'q10', text: 'The author revealed the biggest plot twist in the ___ chapter of the novel, leaving readers shocked right before the final ending.', options: ['penultimate', 'outstanding', 'unexceptional', 'equivalent'] },
        { id: 'q11', text: 'The scientist felt a great sense of ___ when his long-term research project was finally published.', options: ['satisfaction', 'excitement', 'magazine', 'sculpture'] },
        { id: 'q12', text: 'Due to the high number of applicants, the university\'s admission process is highly ___ this year.', options: ['selective', 'curious', 'intellectual', 'associated'] },
        { id: 'q13', text: 'The earth is not a perfect ___, but rather slightly flattened at the poles.', options: ['sphere', 'trail', 'sight', 'magazine'] },
        { id: 'q14', text: 'After a long winter, the bear finally ___ from its cave to search for food.', options: ['emerges', 'determines', 'lay', 'involved'] },
        { id: 'q15', text: 'Please ___ the documents carefully on the boss\'s desk so they don\'t get mixed up.', options: ['lay', 'assume', 'determine', 'encl'] },
        { id: 'q16', text: 'She bought a popular fashion ___ to read while waiting at the airport.', options: ['magazine', 'sculpture', 'sphere', 'ward'] },
        { id: 'q17', text: 'The little boy was very ___ about how the old clock worked, so he took it apart.', options: ['curious', 'unexceptional', 'resolute', 'deprived'] },
        { id: 'q18', text: 'The police investigators are trying to ___ the exact cause of the accident.', options: ['determine', 'lay', 'encl', 'assume'] },
        { id: 'q19', text: 'The children could not hide their ___ when they heard they were going to the amusement park.', options: ['excitement', 'satisfaction', 'sight', 'trail'] },
        { id: 'q20', text: 'We followed a narrow, muddy ___ through the dense pine forest.', options: ['trail', 'sphere', 'magazine', 'ward'] },
        { id: 'q21', text: 'Please find my resume and cover letter ___ in this letter.', options: ['enclosed', 'lay', 'associated', 'involved'] },
        { id: 'q22', text: 'The golden sunset over the ocean was a truly beautiful ___ to behold.', options: ['sight', 'sculpture', 'creatures', 'excitement'] },
        { id: 'q23', text: '___, the meeting has been canceled, but no one officially sent me an email yet.', options: ['Apparently', 'Selective', 'Equivalent', 'Innate'] },
        { id: 'q24', text: 'The food at the new restaurant was rather ___; it wasn\'t bad, but nothing special either.', options: ['unexceptional', 'outstanding', 'innovative', 'prestigious'] },
        { id: 'q25', text: 'The local charity project ___ over a hundred volunteers from different neighborhoods.', options: ['involved', 'determined', 'lay', 'associated'] },
        { id: 'q26', text: 'Playing chess is considered an ___ activity that requires deep strategic thinking.', options: ['intellectual', 'unexceptional', 'neural', 'replicable'] },
        { id: 'q27', text: 'Scientists are studying the ___ pathways in the human brain to understand how memories are formed.', options: ['neural', 'outstanding', 'intellectual', 'selective'] },
        { id: 'q28', text: 'William Shakespeare and Christopher Marlowe were ___, living and writing during the exact same historical era.', options: ['contemporaries', 'creatures', 'traits', 'spheres'] },
        { id: 'q29', text: 'High stress levels in modern life are often ___ with various health problems like heart disease.', options: ['associated', 'deprived', 'involved', 'devoted'] },
        { id: 'q30', text: 'For a scientific experiment to be valid, its results must be ___ by other independent researchers.', options: ['replicable', 'innate', 'unexceptional', 'intellectual'] },
        { id: 'q31', text: 'The rescued animals were severely ___ of food and fresh water for several days.', options: ['deprived', 'associated', 'involved', 'resolute'] },
        { id: 'q32', text: 'The national museum just unveiled a beautiful marble ___ created by a famous Italian artist.', options: ['sculpture', 'magazine', 'trail', 'sight'] },
        { id: 'q33', text: 'She received a special award for her ___ performance in the annual school play.', options: ['outstanding', 'unexceptional', 'deprived', 'curious'] },
        { id: 'q34', text: 'The deep dark ocean is home to many strange and fascinating ___ that can survive without sunlight.', options: ['creatures', 'contemporaries', 'traits', 'spheres'] },
        { id: 'q35', text: 'The young nurse quickly rushed to the pediatric ___ to check on the crying baby.', options: ['ward', 'trail', 'sight', 'magazine'] }
    ];

    const container = document.getElementById('questionsContainer');

    // 1. Dynamically render questions
    questionsData.forEach((q, index) => {
        let optionsHTML = q.options.map(opt => `
            <label class="option-label">
                <input type="radio" name="${q.id}" value="${opt}" required>
                <span>${opt}</span>
            </label>
        `).join('');

        let cardHTML = `
            <div class="card" id="card-${q.id}">
                <div class="question-text">${index + 1}. ${q.text} <span class="required">*</span></div>
                <div class="options-container">
                    ${optionsHTML}
                </div>
                <div class="feedback" id="feedback-${q.id}"></div>
            </div>
        `;
        container.innerHTML += cardHTML;
    });

    // 2. Handle Form Submission securely
    document.getElementById('quizForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Grading...';

        const formData = new FormData(this);
        const params = new URLSearchParams();
        
        // Convert FormData to URL query parameters for the GET request
        for (const [key, value] of formData.entries()) {
            params.append(key, value);
        }

        try {
            // CRITICAL: credentials 'omit' bypasses 403 errors when users have multiple Google profiles logged in
            const response = await fetch(`${scriptURL}?${params.toString()}`, {
                method: 'GET',
                credentials: 'omit' 
            });
            
            const result = await response.json();
            
            if (result.success) {
                displayResults(formData, result.key, result.score, result.total);
            } else {
                alert('Server Error: ' + result.error);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit';
            }
        } catch (error) {
            console.error('Fetch error:', error);
            alert('Failed to submit. Please check your connection or CORS settings.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit';
        }
    });

    // 3. Display Results and Disable Inputs
    function displayResults(formData, answerKey, score, total) {
        // Show Final Score
        const scoreDiv = document.getElementById('scoreDisplay');
        scoreDiv.innerHTML = `Your Score: ${score} / ${total}`;
        scoreDiv.style.display = 'block';

        // Hide Submit button
        document.getElementById('submitBtn').style.display = 'none';

        // Loop through everything to disable inputs and show right/wrong answers
        const allInputs = document.querySelectorAll('input');
        allInputs.forEach(input => input.disabled = true);

        questionsData.forEach(q => {
            const studentAnswer = formData.get(q.id);
            const correctAnswer = answerKey[q.id];
            const feedbackDiv = document.getElementById(`feedback-${q.id}`);
            const card = document.getElementById(`card-${q.id}`);

            feedbackDiv.style.display = 'block';

            if (studentAnswer === correctAnswer) {
                feedbackDiv.textContent = '✓ Correct';
                feedbackDiv.className = 'feedback correct-text';
                card.style.borderLeft = '6px solid var(--correct-color)';
            } else {
                feedbackDiv.innerHTML = `✗ Incorrect. The correct answer is: <b>${correctAnswer}</b>`;
                feedbackDiv.className = 'feedback incorrect-text';
                card.style.borderLeft = '6px solid var(--incorrect-color)';
            }
        });

        // Scroll smoothly to the top to see the score
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
